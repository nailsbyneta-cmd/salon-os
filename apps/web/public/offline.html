<!doctype html>
<html lang="de-CH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Offline · Beautyneta</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: #0a0a0a;
        color: #fafaf9;
        font-family:
          'Montserrat',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          system-ui,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #d0b07c;
        margin-bottom: 12px;
      }
      h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 500;
        font-size: clamp(28px, 6vw, 40px);
        margin: 0 0 16px;
        letter-spacing: -0.5px;
      }
      p {
        color: rgba(250, 250, 249, 0.7);
        font-size: 14px;
        line-height: 1.55;
        margin: 0 0 24px;
      }
      button {
        appearance: none;
        background: #d0b07c;
        color: #0a0a0a;
        border: 0;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        font-family: inherit;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(208, 176, 124, 0.25);
      }
      button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">Offline</span>
      <h1>Kurz keine Verbindung.</h1>
      <p>
        Wir können den Salon gerade nicht erreichen. Prüf kurz dein Internet — wir warten hier auf
        dich.
      </p>
      <button onclick="location.reload()">Nochmal versuchen</button>
    </div>
  </body>
</html>
