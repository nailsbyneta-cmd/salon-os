# fly.toml für @salon-os/api
# Deploy: `fly deploy --app salon-os-api` aus apps/api/
# Region: Zürich (zrh) — Primär, AMS als Failover.

app = "salon-os-api"
primary_region = "zrh"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
