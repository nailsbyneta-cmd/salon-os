name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: salon_os_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup test database
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
          DIRECT_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
        run: |
          cd packages/db
          pnpm prisma migrate deploy

      - name: Build API
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
          DIRECT_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
        run: pnpm --filter api build

      - name: Start API server
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
          DIRECT_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
          REDIS_URL: 'redis://localhost:6379'
          NODE_ENV: 'development'
          PORT: '4000'
        run: |
          pnpm --filter api start &
          # Wait until /health/ready responds (max 60s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health/ready && echo "API ready" && break
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
          DIRECT_URL: 'postgresql://postgres:postgres@localhost:5432/salon_os_test'
          REDIS_URL: 'redis://localhost:6379'
          PUBLIC_API_URL: 'http://localhost:4000'
        run: pnpm test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ E2E tests passed! [View report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })
