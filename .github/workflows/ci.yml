name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  # ─── Setup — install once, share across jobs ────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      pnpm-cache-hit: ${{ steps.pnpm-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

  # ─── Typecheck ──────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @salon-os/db db:generate
      # apps/api hat ~29 vorbestehende TS-Fehler (Test-Fixtures veraltet,
      # ioredis types, outbox JSON, rate-limit plugin typing). Werden in
      # einer dedizierten api-cleanup-PR behoben; aktuell ausgenommen.
      - run: pnpm turbo typecheck --filter=!@salon-os/api

  # ─── Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @salon-os/db db:generate
      - run: pnpm turbo lint --filter=!@salon-os/api
      - run: pnpm format:check

  # ─── Build ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @salon-os/db db:generate
      - run: pnpm turbo build --filter=!@salon-os/api

  # ─── Test ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: salon
          POSTGRES_PASSWORD: salon
          POSTGRES_DB: salon_os_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U salon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @salon-os/db db:generate
      - run: pnpm turbo test --filter=!@salon-os/api
        env:
          DATABASE_URL: postgresql://salon:salon@localhost:5432/salon_os_test?schema=public
          REDIS_URL: redis://localhost:6379

  # ─── Behavior Tests (Block A — echte Postgres-Persistenz) ──
  test-behavior:
    name: Test (Behavior, api)
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: salon
          POSTGRES_PASSWORD: salon
          POSTGRES_DB: salon_os_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U salon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @salon-os/db db:generate
      - name: Run prisma migrations against CI postgres
        env:
          DATABASE_URL: postgresql://salon:salon@localhost:5432/salon_os_test
        run: pnpm --filter @salon-os/db exec prisma migrate deploy
      - name: Run behavior tests
        working-directory: apps/api
        env:
          # TEST_DATABASE_URL aktiviert reuse-Modus im test-postgres.ts —
          # kein Testcontainer-Pull, direkt gegen die CI-Postgres-Service.
          TEST_DATABASE_URL: postgresql://salon:salon@localhost:5432/salon_os_test
        run: pnpm test:behavior

  # ─── Security-Scan (Trivy für Dependencies + Filesystem) ────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table

      # TODO: Snyk (braucht SNYK_TOKEN secret)
      # - uses: snyk/actions/node@master
      #   env: { SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} }
