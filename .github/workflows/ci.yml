name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  # ─── Setup — install once, share across jobs ────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      pnpm-cache-hit: ${{ steps.pnpm-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

  # ─── Typecheck ──────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck

  # ─── Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ─── Build ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

  # ─── Test ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: salon
          POSTGRES_PASSWORD: salon
          POSTGRES_DB: salon_os_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U salon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://salon:salon@localhost:5432/salon_os_test?schema=public
          REDIS_URL: redis://localhost:6379

  # ─── Integration-Tests ─────────────────────────────────────
  # Lokal via Testcontainers (Docker), in CI via Postgres-Service +
  # TEST_DATABASE_URL. Migrations werden vor der Suite applied, zwischen
  # Tests per TRUNCATE zurückgesetzt.
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: salon
          POSTGRES_PASSWORD: salon
          POSTGRES_DB: salon_os_integration
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U salon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://salon:salon@localhost:5433/salon_os_integration?schema=public
      DATABASE_URL: postgresql://salon:salon@localhost:5433/salon_os_integration?schema=public
      DIRECT_URL: postgresql://salon:salon@localhost:5433/salon_os_integration?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @salon-os/db run db:generate
      - run: pnpm --filter @salon-os/db --filter @salon-os/types --filter @salon-os/utils --filter @salon-os/auth build
      - run: pnpm --filter @salon-os/db run db:migrate:deploy
      - run: pnpm --filter @salon-os/api run test:integration

  # ─── Security-Scan (Trivy für Dependencies + Filesystem) ────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table

      # TODO: Snyk (braucht SNYK_TOKEN secret)
      # - uses: snyk/actions/node@master
      #   env: { SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} }
